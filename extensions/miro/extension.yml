schema_version: '1.0'
extension:
  id: miro
  name: miro
  version: 1.3.0
  description: Secure access to Miro boards. Enables AI to read board context, create diagrams, and generate
    code with enterprise-grade security.
  author: Miro
  license: Apache-2.0
  repository: https://miro.com
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.miro.miro-browse
    file: skills/miro-browse/SKILL.md
    description: Use when the user wants to explore, list, summarize, or inspect items on a Miro board.
  - name: speckit.miro.miro-code-explain-on-board
    file: skills/miro-code-explain-on-board/SKILL.md
    description: "Use when the user wants to explain or visualize a codebase on a Miro board \u2014 produces\
      \ a minimal, notation-correct set of architecture / structure / behavior diagrams (flowchart, UML\
      \ class, UML sequen\u2026"
  - name: speckit.miro.miro-code-review
    file: skills/miro-code-review/SKILL.md
    description: "Use when the user wants to create a visual code review on a Miro board from a pull/merge\
      \ request (GitHub, GitLab, or any forge), local uncommitted changes, or a branch comparison \u2014\
      \ produces a file-ch\u2026"
  - name: speckit.miro.miro-code-spec
    file: skills/miro-code-spec/SKILL.md
    description: "Use when the user wants to extract a Miro board's specs (documents, diagrams, prototypes,\
      \ tables, frames, images) to local `.miro/specs/` files for AI-assisted planning and implementation\
      \ \u2014 accepts a\u2026"
  - name: speckit.miro.miro-diagram
    file: skills/miro-diagram/SKILL.md
    description: Use when the user wants to create or update a diagram on a Miro board.
  - name: speckit.miro.miro-doc
    file: skills/miro-doc/SKILL.md
    description: Use when the user wants to create or edit a Google-Docs-style markdown document on a
      Miro board.
  - name: speckit.miro.miro-table
    file: skills/miro-table/SKILL.md
    description: Use when the user wants to create or update a structured table on a Miro board.
tags:

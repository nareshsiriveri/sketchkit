    description: "Use when building any system where email content triggers actions \u2014 AI agent inboxes,\
      \ automated support handlers, email-to-task pipelines, or any workflow processing untrusted inbound\
      \ email. Always u\u2026"
  - name: speckit.resend.email-best-practices
    file: skills/email-best-practices/SKILL.md
    description: "Use when building email features, emails going to spam, high bounce rates, setting up\

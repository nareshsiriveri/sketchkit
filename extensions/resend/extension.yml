      \ emails with Rese\u2026"
  - name: speckit.resend.resend
    file: skills/resend/SKILL.md
    description: "Use when working with the Resend email API \u2014 sending transactional emails (single\
      \ or batch), receiving inbound emails via webhooks, managing email templates, tracking delivery\
      \ events, managing domain\u2026"
  - name: speckit.resend.resend-cli
    file: skills/resend-cli/SKILL.md
    description: "Operate the Resend platform from the terminal \u2014 send emails (including React Email\

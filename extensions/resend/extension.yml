schema_version: '1.0'
extension:
  id: resend
  name: resend
  version: 1.0.0
  description: Send and receive emails, build with React Email, follow deliverability best practices
  author: Resend
  license: Apache-2.0
  repository: https://resend.com
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.resend.agent-email-inbox

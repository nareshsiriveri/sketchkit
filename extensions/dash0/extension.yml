# Converted from a Claude Code plugin in anthropics/claude-plugins-official (via https://github.com/dash0hq/dash0-agent-plugin)
# Source: https://dash0.com/
# License: Apache-2.0

schema_version: '1.0'
extension:
  id: dash0
  name: dash0
  version: 0.1.10
  description: OpenTelemetry observability for Claude Code sessions. Captures tool calls, LLM invocations,
    token usage, and errors as OTel traces.
  author: Dash0
  license: Apache-2.0
  repository: https://dash0.com/
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.dash0.open-session
    file: commands/open-session.md
    description: Open the Dash0 session details page for the current session.
  - name: speckit.dash0.dash0-configure
    file: skills/dash0-configure/SKILL.md
    description: "Configure the Dash0 \u2192 Cursor telemetry integration by writing the OTLP URL and\
      \ auth token to ~/.cursor/dash0-agent-plugin.local.md. Use when the user wants to set up Dash0,\
      \ enable telemetry, paste cr\u2026"
tags:
- observability
- tracing
- opentelemetry
- dash0
- otel

# Converted from a Claude Code plugin in anthropics/claude-plugins-official (via https://github.com/spotify/confidence-ai-plugins)
# Source: https://confidence.spotify.com
# License: Apache-2.0

schema_version: '1.0'
extension:
  id: confidence
  name: confidence
  version: 0.4.1
  description: Access Confidence feature flags, experiments, and migration tools directly from Claude
    Code.
  author: Spotify Confidence
  license: Apache-2.0
  repository: https://confidence.spotify.com
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.confidence.migrate-eppo
    file: commands/migrate-eppo.md
    description: Migrate feature flags from Eppo to Confidence
  - name: speckit.confidence.migrate-optimizely
    file: commands/migrate-optimizely.md
    description: Migrate feature flags from Optimizely to Confidence
  - name: speckit.confidence.migrate-posthog
    file: commands/migrate-posthog.md
    description: Migrate feature flags from PostHog to Confidence
  - name: speckit.confidence.migrate-statsig
    file: commands/migrate-statsig.md
    description: Migrate feature flags from Statsig to Confidence
  - name: speckit.confidence.onboard-confidence
    file: commands/onboard-confidence.md
    description: Create Confidence accounts and onboard users
  - name: speckit.confidence.migrate-eppo-skill
    file: skills/migrate-eppo/SKILL.md
    description: Migrate feature flags from Eppo to Confidence SDK. Use when the user says /migrate-eppo,
      asks to migrate Eppo flags, or transform SDK code to Confidence.
  - name: speckit.confidence.migrate-optimizely-skill
    file: skills/migrate-optimizely/SKILL.md
    description: "Migrate feature flags from Optimizely to Confidence SDK. Use when the user says /migrate-optimizely,\
      \ asks to migrate Optimizely flags/rollouts/experiments, or transform Optimizely SDK code to Confide\u2026"
  - name: speckit.confidence.migrate-posthog-skill
    file: skills/migrate-posthog/SKILL.md
    description: Migrate feature flags from PostHog to Confidence SDK. Use when the user says /migrate-posthog,
      asks to migrate PostHog flags, or transform SDK code to Confidence.
  - name: speckit.confidence.migrate-statsig-skill
    file: skills/migrate-statsig/SKILL.md
    description: Migrate feature flags from Statsig to Confidence SDK. Use when the user says /migrate-statsig,
      asks to migrate Statsig gates/configs/experiments, or transform SDK code to Confidence.
  - name: speckit.confidence.onboard-confidence-skill
    file: skills/onboard-confidence/SKILL.md
    description: Create Confidence accounts and onboard users. Use when the user asks to create an account,
      invite users, onboard to Confidence, or check account status.
  - name: speckit.confidence.onboard-confidence-dry-run
    file: skills/onboard-confidence-dry-run/SKILL.md
    description: Dry-run the Confidence onboarding flow to test UX without real API calls. Use when the
      user says "dry run", "test onboarding", "demo onboarding", or wants to preview the onboarding experience.
  - name: speckit.confidence.setup-warehouse
    file: skills/setup-warehouse/SKILL.md
    description: Set up a data warehouse for Confidence experimentation analytics. Use when the user asks
      to connect a warehouse, set up BigQuery/Snowflake/Databricks/Redshift, or configure data connectors.
  - name: speckit.confidence.setup-warehouse-bigquery
    file: skills/setup-warehouse-bigquery/SKILL.md
    description: Set up BigQuery as a data warehouse for Confidence. Use when the user chose BigQuery
      for warehouse setup.
  - name: speckit.confidence.setup-warehouse-databricks
    file: skills/setup-warehouse-databricks/SKILL.md
    description: Set up Databricks as a data warehouse for Confidence. Use when the user chose Databricks
      for warehouse setup.
  - name: speckit.confidence.setup-warehouse-redshift
    file: skills/setup-warehouse-redshift/SKILL.md
    description: Set up Redshift as a data warehouse for Confidence. Use when the user chose Redshift
      for warehouse setup.
  - name: speckit.confidence.setup-warehouse-snowflake
    file: skills/setup-warehouse-snowflake/SKILL.md
    description: Set up Snowflake as a data warehouse for Confidence. Use when the user chose Snowflake
      for warehouse setup.
tags:
- feature-flags
- experiments
- a/b-testing
- migration
- openfeature

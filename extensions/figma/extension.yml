    file: skills/figma-create-new-file/SKILL.md
    description: "**MANDATORY prerequisite** \u2014 you MUST invoke this skill BEFORE every `create_new_file`\
      \ tool call. NEVER call `create_new_file` directly without loading this skill first. Trigger whenever\
      \ the user wan\u2026"
  - name: speckit.figma.figma-generate-design
    file: skills/figma-generate-design/SKILL.md
    description: "Use this skill alongside figma-use when the task involves translating an application\
      \ page, view, or multi-section layout into Figma. Triggers: 'write to Figma', 'create in Figma from\
      \ code', 'push pag\u2026"

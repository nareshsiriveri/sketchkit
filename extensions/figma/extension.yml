  name: figma
  version: 2.2.50
  description: Plugin that includes the Figma MCP server and Skills for common workflows
  author: Figma
  license: Apache-2.0
  repository: https://github.com/figma/mcp-server-guide
requires:
  speckit_version: '>=0.2.0'
provides:

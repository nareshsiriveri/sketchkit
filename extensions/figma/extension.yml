    file: skills/figma-generate-diagram/SKILL.md
    description: "MANDATORY prerequisite \u2014 load this skill BEFORE every `generate_diagram` tool call.\
      \ NEVER call `generate_diagram` directly without loading this skill first. Trigger whenever the\

schema_version: '1.0'
extension:
  id: commit-commands
  name: commit-commands
  version: 0.1.0
  description: Streamline your git workflow with simple commands for committing, pushing, and creating
    pull requests
  author: Anthropic
  license: Apache-2.0
  repository: https://github.com/anthropics/claude-plugins-official
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.commit-commands.clean-gone
    file: commands/clean_gone.md
    description: Cleans up all git branches marked as [gone] (branches that have been deleted on the remote
      but still exist locally), including removing associated worktrees.
  - name: speckit.commit-commands.commit-push-pr
    file: commands/commit-push-pr.md
    description: Commit, push, and open a PR
  - name: speckit.commit-commands.commit
    file: commands/commit.md
    description: Create a git commit
tags:
- claude-code

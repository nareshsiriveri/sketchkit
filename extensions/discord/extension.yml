schema_version: '1.0'
extension:
  id: discord
  name: discord
  version: 0.0.4
  description: "Discord channel for Claude Code \u2014 messaging bridge with built-in access control.\
    \ Manage pairing, allowlists, and policy via /discord:access."
  author: Anthropic
  license: Apache-2.0
  repository: https://github.com/anthropics/claude-plugins-official
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.discord.access
    file: skills/access/SKILL.md
    description: "Manage Discord channel access \u2014 approve pairings, edit allowlists, set DM/group\
      \ policy. Use when the user asks to pair, approve someone, check who's allowed, or change policy\
      \ for the Discord channel."
  - name: speckit.discord.configure
    file: skills/configure/SKILL.md
    description: "Set up the Discord channel \u2014 save the bot token and review access policy. Use when\
      \ the user pastes a Discord bot token, asks to configure Discord, asks \"how do I set this up\"\
      \ or \"who can reach me,\" o\u2026"
tags:
- discord
- messaging
- channel
- mcp

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Geist, sans-serif">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#0a3d2c" stop-opacity="0.46"/>
      <stop offset="100%" stop-color="#000503" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlow2" cx="82%" cy="100%" r="65%">
      <stop offset="0%" stop-color="#1a2f5e" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#000503" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardGlass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1518" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#0a1112" stop-opacity="0.97"/>
    </linearGradient>
    <linearGradient id="cardGlassActive" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e2023" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#091517" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="hairline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3fe1f3" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3fe1f3" stop-opacity="0.64"/>
      <stop offset="100%" stop-color="#3fe1f3" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hairlineGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f078" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00f078" stop-opacity="0.64"/>
      <stop offset="100%" stop-color="#00f078" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hairlinePurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9f69f7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#9f69f7" stop-opacity="0.70"/>
      <stop offset="100%" stop-color="#9f69f7" stop-opacity="0"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.42"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3fe1f3"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00f078"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9f69f7"/>
    </marker>
  </defs>

  <rect width="1280" height="700" fill="#000503"/>
  <rect width="1280" height="700" fill="url(#bgGlow)"/>
  <rect width="1280" height="700" fill="url(#bgGlow2)"/>

  <g transform="translate(40, 34)">
    <text x="0" y="26" font-size="25" font-weight="700" fill="#e5f6f7">Endor Troubleshooter - Read-Only Diagnostics Agent</text>
    <text x="0" y="53" font-size="13" fill="#9fb4be">Natural-language Endor issue to evidence-backed root cause to low-friction repair guidance</text>
    <text x="0" y="75" font-size="11" fill="#7c93a0">No scans, profile writes, integration changes, credential changes, comments, PRs, MRs, or Endor writes.</text>
  </g>

  <g transform="translate(36, 148)">
    <g filter="url(#cardShadow)">
      <rect width="190" height="136" rx="12" fill="url(#cardGlass)" stroke="#17323a"/>
      <rect x="20" y="0" width="150" height="2" fill="url(#hairline)"/>
      <text x="20" y="34" font-size="11" font-weight="700" fill="#3fe1f3" letter-spacing="1.4">INPUT</text>
      <text x="20" y="62" font-size="18" font-weight="700" fill="#e5f6f7">Issue Signal</text>
      <text x="20" y="88" font-size="12" fill="#9fb4be">error text, UUID</text>
      <text x="20" y="108" font-size="12" fill="#9fb4be">or plain language</text>
    </g>
    <line x1="202" y1="68" x2="248" y2="68" stroke="#3fe1f3" stroke-width="1.4" marker-end="url(#arrowCyan)"/>

    <g transform="translate(266,0)" filter="url(#cardShadow)">
      <rect width="190" height="136" rx="12" fill="url(#cardGlassActive)" stroke="#1c5360"/>
      <rect x="20" y="0" width="150" height="2" fill="url(#hairlineGreen)"/>
      <text x="20" y="34" font-size="11" font-weight="700" fill="#00f078" letter-spacing="1.4">CLASSIFY</text>
      <text x="20" y="62" font-size="18" font-weight="700" fill="#e5f6f7">Issue Lanes</text>
      <text x="20" y="88" font-size="12" fill="#9fb4be">scan, auth, SSO</text>
      <text x="20" y="108" font-size="12" fill="#9fb4be">containers, policy</text>
    </g>
    <line x1="468" y1="68" x2="514" y2="68" stroke="#00f078" stroke-width="1.4" marker-end="url(#arrowGreen)"/>

    <g transform="translate(532,0)" filter="url(#cardShadow)">
      <rect width="190" height="136" rx="12" fill="url(#cardGlass)" stroke="#17323a"/>
      <rect x="20" y="0" width="150" height="2" fill="url(#hairlinePurple)"/>
      <text x="20" y="34" font-size="11" font-weight="700" fill="#9f69f7" letter-spacing="1.4">EVIDENCE</text>
      <text x="20" y="62" font-size="18" font-weight="700" fill="#e5f6f7">Smallest Pack</text>
      <text x="20" y="88" font-size="12" fill="#9fb4be">read-only Endor</text>
      <text x="20" y="108" font-size="12" fill="#9fb4be">projected output</text>
    </g>
    <line x1="734" y1="68" x2="780" y2="68" stroke="#9f69f7" stroke-width="1.4" marker-end="url(#arrowPurple)"/>

    <g transform="translate(798,0)" filter="url(#cardShadow)">
      <rect width="190" height="136" rx="12" fill="url(#cardGlass)" stroke="#17323a"/>
      <rect x="20" y="0" width="150" height="2" fill="url(#hairline)"/>
      <text x="20" y="34" font-size="11" font-weight="700" fill="#3fe1f3" letter-spacing="1.4">DIAGNOSE</text>
      <text x="20" y="62" font-size="18" font-weight="700" fill="#e5f6f7">Root Cause</text>
      <text x="20" y="88" font-size="12" fill="#9fb4be">ranked hypotheses</text>
      <text x="20" y="108" font-size="12" fill="#9fb4be">confidence and gaps</text>
    </g>
    <line x1="1000" y1="68" x2="1014" y2="68" stroke="#3fe1f3" stroke-width="1.4" marker-end="url(#arrowCyan)"/>

    <g transform="translate(1030,0)" filter="url(#cardShadow)">
      <rect width="180" height="136" rx="12" fill="url(#cardGlassActive)" stroke="#1f6540"/>
      <rect x="20" y="0" width="140" height="2" fill="url(#hairlineGreen)"/>
      <text x="20" y="34" font-size="11" font-weight="700" fill="#00f078" letter-spacing="1.4">OUTPUT</text>
      <text x="20" y="62" font-size="18" font-weight="700" fill="#e5f6f7">Fix Guidance</text>
      <text x="20" y="88" font-size="12" fill="#9fb4be">low-friction steps</text>
      <text x="20" y="108" font-size="12" fill="#9fb4be">validation plan</text>
    </g>
  </g>

  <g transform="translate(70, 342)">
    <g filter="url(#cardShadow)">
      <rect width="350" height="170" rx="12" fill="url(#cardGlass)" stroke="#17323a"/>
      <rect x="24" y="0" width="302" height="2" fill="url(#hairline)"/>
      <text x="24" y="34" font-size="11" font-weight="700" fill="#3fe1f3" letter-spacing="1.5">INTAKE AND LANES</text>
      <text x="24" y="64" font-size="18" font-weight="700" fill="#e5f6f7">Any Endor Issue</text>
      <text x="24" y="94" font-size="12" fill="#9fb4be">- scans, PRs, containers, SBOMs</text>
      <text x="24" y="118" font-size="12" fill="#9fb4be">- auth, SSO, integrations, exporters</text>
      <text x="24" y="142" font-size="12" fill="#9fb4be">- policy, findings, reachability</text>
    </g>

    <g transform="translate(395,0)" filter="url(#cardShadow)">
      <rect width="390" height="170" rx="12" fill="url(#cardGlassActive)" stroke="#1c5360"/>
      <rect x="24" y="0" width="342" height="2" fill="url(#hairlineGreen)"/>
      <text x="24" y="34" font-size="11" font-weight="700" fill="#00f078" letter-spacing="1.5">ENDOR EVIDENCE</text>
      <text x="24" y="64" font-size="18" font-weight="700" fill="#e5f6f7">Read-Only API Lookups</text>
      <text x="24" y="94" font-size="12" fill="#9fb4be">- ScanResult and workflow evidence</text>
      <text x="24" y="118" font-size="12" fill="#9fb4be">- integrations, package managers, IdP</text>
      <text x="24" y="142" font-size="12" fill="#9fb4be">- missing signals become data_gaps</text>
    </g>

    <g transform="translate(830,0)" filter="url(#cardShadow)">
      <rect width="350" height="170" rx="12" fill="url(#cardGlass)" stroke="#17323a"/>
      <rect x="24" y="0" width="302" height="2" fill="url(#hairlinePurple)"/>
      <text x="24" y="34" font-size="11" font-weight="700" fill="#9f69f7" letter-spacing="1.5">SAFETY BOUNDARY</text>
      <text x="24" y="64" font-size="18" font-weight="700" fill="#e5f6f7">Prescribe, Do Not Mutate</text>
      <text x="24" y="94" font-size="12" fill="#9fb4be">- no reruns or create-style log calls</text>
      <text x="24" y="118" font-size="12" fill="#9fb4be">- no credential or profile writes</text>
      <text x="24" y="142" font-size="12" fill="#9fb4be">- future action contracts gate fixes</text>
    </g>
  </g>

  <g transform="translate(70, 575)">
    <rect width="1140" height="78" rx="12" fill="#071012" stroke="#17323a"/>
    <rect x="30" y="0" width="1080" height="2" fill="url(#hairlineGreen)"/>
    <text x="30" y="34" font-size="12" font-weight="700" fill="#00f078" letter-spacing="1.5">PUBLISHED CONTRACT</text>
    <text x="30" y="58" font-size="13" fill="#cfe4e8">Returns verdict, issue lanes, evidence queries, root-cause hypotheses, repair steps, validation plan, and gated future actions.</text>
  </g>
</svg>

schema_version: '1.0'
extension:
  id: liquid-skills
  name: liquid-skills
  version: 1.0.0
  description: Liquid language fundamentals, CSS/JS/HTML coding standards, and WCAG accessibility patterns
    for Shopify themes
  author: Shopify
  license: Apache-2.0
  repository: https://github.com/Shopify/liquid-skills/tree/main/plugins/liquid-skills
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.liquid-skills.liquid-theme-a11y
    file: skills/liquid-theme-a11y/SKILL.md
    description: "Implement WCAG 2.2 accessibility patterns in Shopify Liquid themes. Covers e-commerce-specific\
      \ components including product cards, carousels, cart drawers, price display, forms, filters, and\
      \ modals.\u2026"
  - name: speckit.liquid-skills.liquid-theme-standards
    file: skills/liquid-theme-standards/SKILL.md
    description: "CSS, JavaScript, and HTML coding standards for Shopify Liquid themes. Covers BEM naming\
      \ inside stylesheet tags, design tokens, CSS custom properties, Web Components for themes, defensive\
      \ CSS, and pro\u2026"
  - name: speckit.liquid-skills.shopify-liquid-themes
    file: skills/shopify-liquid-themes/SKILL.md
    description: "Generate Shopify Liquid theme code (sections, blocks, snippets) with correct schema\
      \ JSON, LiquidDoc headers, translation keys, and CSS/JS patterns. Use when creating or editing .liquid\
      \ files for Shop\u2026"
tags:
- liquid
- shopify
- theme
- accessibility
- css
- javascript

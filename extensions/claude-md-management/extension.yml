schema_version: '1.0'
extension:
  id: claude-md-management
  name: claude-md-management
  version: 1.0.0
  description: Tools to maintain and improve CLAUDE.md files - audit quality, capture session learnings,
    and keep project memory current.
  author: Anthropic
  license: Apache-2.0
  repository: https://github.com/anthropics/claude-plugins-official
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.claude-md-management.revise-claude-md
    file: commands/revise-claude-md.md
    description: Update CLAUDE.md with learnings from this session
  - name: speckit.claude-md-management.claude-md-improver
    file: skills/claude-md-improver/SKILL.md
    description: "Audit and improve CLAUDE.md files in repositories. Use when user asks to check, audit,\
      \ update, improve, or fix CLAUDE.md files. Scans for all CLAUDE.md files, evaluates quality against\
      \ templates, out\u2026"
tags:
- claude-code

schema_version: '1.0'
extension:
  id: logfire
  name: logfire
  version: 0.1.3
  description: Add Logfire observability to Python applications with auto-instrumentation for FastAPI,
    httpx, asyncpg, SQLAlchemy, and more
  author: Pydantic
  license: Apache-2.0
  repository: https://github.com/pydantic/skills/tree/main/plugins/logfire
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.logfire.debug
    file: commands/debug.md
    description: Use Logfire traces to investigate errors and debug production issues
  - name: speckit.logfire.dev-session
    file: commands/dev-session.md
    description: Start a local Logfire dev session to send traces from your running app for debugging
  - name: speckit.logfire.instrument
    file: commands/instrument.md
    description: Detect languages and frameworks in the current project and add Logfire instrumentation
  - name: speckit.logfire.query
    file: commands/query.md
    description: Query Logfire telemetry data interactively or add query capabilities to code
  - name: speckit.logfire.logfire-instrumentation
    file: skills/logfire-instrumentation/SKILL.md
    description: "Add Pydantic Logfire observability to applications. Use this skill whenever the user\
      \ asks to \"add logfire\", \"instrument with logfire\", \"add observability\", \"add tracing\",\
      \ \"configure logfire\", \"add mo\u2026"
  - name: speckit.logfire.logfire-query
    file: skills/logfire-query/SKILL.md
    description: "Query and analyze Logfire telemetry data \u2014 traces, logs, spans, metrics, summaries,\
      \ and SQL results. Use this skill when the user asks to \"query logfire\", \"search traces\", \"\
      find logs\", \"query data\",\u2026"
  - name: speckit.logfire.logfire-ui
    file: skills/logfire-ui/SKILL.md
    description: "Open or return Logfire project pages, live views, trace links, and Explore pages in\
      \ the Codex browser without querying telemetry first. Use this skill when the user asks to \"open\
      \ in Logfire\", \"show i\u2026"
tags:
- monitoring

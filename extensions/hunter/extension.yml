    file: skills/company-enrichment/SKILL.md
    description: "Retrieves detailed company information including industry, size, location, and description\
      \ from a domain name. Use when the user asks about a company, wants company details, or says \"\
      tell me about [c\u2026"
  - name: speckit.hunter.discover
    file: skills/discover/SKILL.md
    description: "Searches for companies matching specific criteria like industry, size, location, and\
      \ technologies. Use when the user wants to find companies, build a target list, or search for businesses\
      \ in a market\u2026"
  - name: speckit.hunter.domain-search
    file: skills/domain-search/SKILL.md
    description: "Finds all publicly available email addresses and contacts at a company domain. Use when\

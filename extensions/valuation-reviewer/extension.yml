    file: skills/returns-analysis/SKILL.md
    description: "Build quick IRR/MOIC sensitivity tables for PE deal evaluation. Models returns across\
      \ entry multiple, leverage, exit multiple, growth, and hold period scenarios. Use when sizing up\

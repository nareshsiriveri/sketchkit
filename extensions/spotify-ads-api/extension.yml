schema_version: '1.0'
extension:
  id: spotify-ads-api
  name: spotify-ads-api
  version: 1.5.0
  description: "Manage Spotify ad campaigns with natural language. Create campaigns, ad sets, ads, pull\
    \ reports, and handle OAuth \u2014 all through conversation."
  author: Alex Murphy
  license: Apache-2.0
  repository: https://github.com/spotify/ads-claude-plugin
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.spotify-ads-api.ads
    file: skills/ads/SKILL.md
    description: "Manage Spotify Ads API ad sets and ads \u2014 list, create, get, or update."
  - name: speckit.spotify-ads-api.api-reference
    file: skills/api-reference/SKILL.md
    description: "This skill should be used when the user asks to \"call the Spotify Ads API\", \"create\
      \ a Spotify ad campaign\", \"manage Spotify ads\", \"pull Spotify ad reports\", \"set up ad sets\
      \ or ads\", \"upload ad assets\u2026"
  - name: speckit.spotify-ads-api.assets
    file: skills/assets/SKILL.md
    description: "Upload, list, and manage Spotify Ads API creative assets \u2014 audio, video, and images\
      \ for ad campaigns."
  - name: speckit.spotify-ads-api.build-campaign
    file: skills/build-campaign/SKILL.md
    description: Create a full campaign (campaign + ad sets + ads) from a plain-text description. Parses
      natural language into structured API calls.
  - name: speckit.spotify-ads-api.bulk
    file: skills/bulk/SKILL.md
    description: "Apply batch operations to multiple Spotify Ads API entities \u2014 pause or resume ad\
      \ sets, update budgets, toggle ad delivery, swap creatives, or archive campaigns, ad sets, and ads."
  - name: speckit.spotify-ads-api.campaign-strategy
    file: skills/campaign-strategy/SKILL.md
    description: "Generate Spotify Ads campaign strategy from a landing page, product or business page,\
      \ brand brief, location page, uploaded creative assets, existing Spotify Ads assets, or a natural-language\
      \ business\u2026"
  - name: speckit.spotify-ads-api.campaigns
    file: skills/campaigns/SKILL.md
    description: List, create, get, or update Spotify Ads API campaigns.
  - name: speckit.spotify-ads-api.clone
    file: skills/clone/SKILL.md
    description: "Clone an existing Spotify Ads API campaign or ad set \u2014 duplicate the full hierarchy\
      \ (campaign, ad sets, ads) with optional modifications to name, dates, budget, or targeting."
  - name: speckit.spotify-ads-api.configure
    file: skills/configure/SKILL.md
    description: Configure Spotify Ads API credentials via OAuth 2.0 or direct token. Sets up authentication,
      ad account, and execution preferences.
  - name: speckit.spotify-ads-api.dashboard
    file: skills/dashboard/SKILL.md
    description: "Quick performance overview of all active Spotify ad campaigns \u2014 impressions, spend,\
      \ reach, clicks, and pacing at a glance."
  - name: speckit.spotify-ads-api.export
    file: skills/export/SKILL.md
    description: "Export Spotify Ads API campaign data to CSV \u2014 full campaign hierarchies with ad\
      \ sets, ads, targeting, budgets, and performance metrics for offline review, campaign analysis,\
      \ or budget reconciliation."
  - name: speckit.spotify-ads-api.monitor
    file: skills/monitor/SKILL.md
    description: "Check Spotify Ads API campaign health \u2014 pacing, delivery issues, budget burn rate,\
      \ stalled campaigns, and underpacing alerts. Use for one-shot health checks or recurring monitoring\
      \ when the host supp\u2026"
  - name: speckit.spotify-ads-api.report
    file: skills/report/SKILL.md
    description: "Pull Spotify Ads API reporting data \u2014 aggregate metrics, audience insights, or\
      \ async CSV reports."
  - name: speckit.spotify-ads-api.agent-spotify-ads-request-builder
    file: agents/spotify-ads-request-builder.md
    description: Use this agent when the user describes an advertising task in natural language and needs
      it translated into Spotify Ads API calls.
tags:
- spotify
- ads
- api
- campaigns
- advertising
- oauth
- reporting

# Spec-Kit extension manifest.
# Docs: https://github.com/github/spec-kit  (Extensions section)

# Unique id. Must match ^[a-z0-9-]+$ and match this directory name.
id: acme-hello

# Human-readable name surfaced in the catalog.
name: ACME Hello

# Semantic version. Drives the published ZIP name: acme-hello-<version>.zip
version: 0.1.0

# Short description shown in the catalog.
description: Sample org extension that adds a greeting slash command.

# Minimum Spec-Kit version this extension supports.
speckit_version: ">=0.1.0"

# At least one of `commands` or `hooks` is required.
# Command ids must follow the pattern: speckit.<ext-id>.<cmd>
commands:
  - speckit.acme-hello.greet


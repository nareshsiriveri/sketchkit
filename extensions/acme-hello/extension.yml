schema_version: "1.0"

extension:
  id: acme-hello
  name: "ACME Hello"
  version: "0.1.0"
  description: "Sample org extension that adds a greeting slash command. Replace with your real extensions."
  author: Sketchkit
  repository: https://github.com/nareshsiriveri/sketchkit
  license: MIT
  effect: read-only

requires:
  speckit_version: ">=0.2.0"

provides:
  commands:
    - name: speckit.acme-hello.greet
      file: commands/speckit.acme-hello.greet.md
      description: "Greet the user and confirm the ACME Hello extension is active."

tags:
  - sample
  - hello

schema_version: '1.0'
extension:
  id: deploy-on-aws
  name: deploy-on-aws
  version: 1.3.0
  description: Deploy applications to AWS with architecture recommendations, cost estimates, and IaC deployment.
    Generate validated AWS architecture diagrams as draw.io XML.
  author: Amazon Web Services
  license: Apache-2.0
  repository: https://github.com/awslabs/agent-plugins
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.deploy-on-aws.aws-architecture-diagram
    file: skills/aws-architecture-diagram/SKILL.md
    description: "Generate validated AWS architecture diagrams as draw.io XML using official AWS4 icon\
      \ libraries. Use this skill whenever the user wants to create, generate, or design AWS architecture\
      \ diagrams, cloud\u2026"
  - name: speckit.deploy-on-aws.deploy
    file: skills/deploy/SKILL.md
    description: "Deploy applications to AWS. Triggers on phrases like: deploy to AWS, host on AWS, run\
      \ this on AWS, AWS architecture, estimate AWS cost, generate infrastructure. Analyzes any codebase\
      \ and deploys to o\u2026"
  - name: speckit.deploy-on-aws.elastic-beanstalk
    file: skills/elastic-beanstalk/SKILL.md
    description: "Deploy to AWS Elastic Beanstalk. Triggers on: elastic beanstalk, EB, managed EC2 platform,\
      \ web app with managed patching, worker on EC2, Heroku alternative, don't want to manage servers\
      \ or container\u2026"
tags:
- aws
- deploy
- infrastructure
- cdk
- cloudformation
- pricing
- diagrams
- draw.io
- architecture

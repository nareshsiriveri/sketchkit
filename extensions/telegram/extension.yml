schema_version: '1.0'
extension:
  id: telegram
  name: telegram
  version: 0.0.6
  description: "Telegram channel for Claude Code \u2014 messaging bridge with built-in access control.\
    \ Manage pairing, allowlists, and policy via /telegram:access."
  author: Anthropic
  license: Apache-2.0
  repository: https://github.com/anthropics/claude-plugins-official
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.telegram.access
    file: skills/access/SKILL.md
    description: "Manage Telegram channel access \u2014 approve pairings, edit allowlists, set DM/group\
      \ policy. Use when the user asks to pair, approve someone, check who's allowed, or change policy\
      \ for the Telegram channe\u2026"
  - name: speckit.telegram.configure
    file: skills/configure/SKILL.md
    description: "Set up the Telegram channel \u2014 save the bot token and review access policy. Use\
      \ when the user pastes a Telegram bot token, asks to configure Telegram, asks \"how do I set this\
      \ up\" or \"who can reach me,\u2026"
tags:
- telegram
- messaging
- channel
- mcp

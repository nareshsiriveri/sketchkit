schema_version: '1.0'
extension:
  id: nightvision
  name: nightvision
  version: 1.0.1
  description: Skills for working with NightVision, a DAST and API Discovery platform that finds exploitable
    vulnerabilities in web applications and REST APIs
  author: NightVision Engineering
  license: Apache-2.0
  repository: https://github.com/nvsecurity/nightvision-skills
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.nightvision.api-discovery
    file: skills/api-discovery/SKILL.md
    description: "Guide for agents to help users extract OpenAPI specs from source code using NightVision\
      \ API Discovery. Use when running swagger extract, identifying framework support, troubleshooting\
      \ extraction, han\u2026"
  - name: speckit.nightvision.ci-cd-integration
    file: skills/ci-cd-integration/SKILL.md
    description: "Guide for agents to help users integrate NightVision DAST scanning into CI/CD pipelines.\
      \ Use when setting up security scans in GitHub Actions, GitLab CI, Azure DevOps, Jenkins, BitBucket,\
      \ or JFrog pi\u2026"
  - name: speckit.nightvision.scan-configuration
    file: skills/scan-configuration/SKILL.md
    description: "Guide for agents to help users configure NightVision DAST scans. Use when creating targets,\
      \ setting up authentication (Playwright, headers, cookies), recording HTTP traffic, managing projects,\
      \ config\u2026"
  - name: speckit.nightvision.scan-triage
    file: skills/scan-triage/SKILL.md
    description: "Guide for agents to help users interpret and act on NightVision DAST scan results. Use\
      \ when reading SARIF/CSV findings, explaining vulnerabilities, locating vulnerable code, validating\
      \ findings with\u2026"
tags:
- dast
- api-discovery
- security-scanning
- ci-cd
- openapi
- vulnerability-detection

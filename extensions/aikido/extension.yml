schema_version: '1.0'
extension:
  id: aikido
  name: aikido
  version: 1.2.0
  description: 'Aikido Security for Claude Code: scan code (SAST, secrets, IaC) and list all issues from
    your Aikido feed powered by the Aikido MCP server.'
  author: Aikido Security
  license: Apache-2.0
  repository: https://github.com/AikidoSec/aikido-claude-plugin
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.aikido.issues
    file: skills/issues/SKILL.md
    description: "List, count, summarize, or triage security issues from the Aikido security feed. Use\
      \ when the user asks about Aikido findings, vulnerabilities, leaked secrets, SAST/IaC/SCA results,\
      \ cloud or containe\u2026"
  - name: speckit.aikido.scan
    file: skills/scan/SKILL.md
    description: "Runs an Aikido security scan on generated, added, or modified code files to detect SAST\
      \ vulnerabilities and exposed secrets. Use when the user wants to scan code for security issues,\
      \ after writing or\u2026"
  - name: speckit.aikido.setup
    file: skills/setup/SKILL.md
    description: "Configures the Aikido plugin by signing the user in through the MCP login tool and verifying\
      \ the MCP server. Use when the user wants to set up or verify the Aikido plugin, after installing\
      \ it, when a\u2026"
tags:
- aikido
- security
- sast
- secrets
- iac
- sca
- scanning
- vulnerability

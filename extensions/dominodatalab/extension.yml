schema_version: '1.0'
extension:
  id: dominodatalab
  name: dominodatalab
  version: 1.0.0
  description: "Full Domino Data Lab platform support \u2014 workspaces, jobs, model deployment, experiment\
    \ tracking, GenAI tracing, Spark/Ray/Dask, and app deployment for data science teams"
  author: Domino Data Lab
  license: Apache-2.0
  repository: https://www.domino.ai
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.dominodatalab.domino-app-init
    file: commands/domino-app-init.md
    description: Initialize a new Domino-ready web application with Vite+React, Streamlit, Dash, or Flask.
      Configures proxy-compatible settings and app.sh.
  - name: speckit.dominodatalab.domino-debug-proxy
    file: commands/domino-debug-proxy.md
    description: Debug Domino proxy and routing issues for web applications. Analyzes vite.config.js,
      package.json, and app.sh for misconfigurations.
  - name: speckit.dominodatalab.domino-experiment-setup
    file: commands/domino-experiment-setup.md
    description: Set up MLflow experiment tracking for traditional ML. Configures unique experiment names
      and auto-logging.
  - name: speckit.dominodatalab.domino-trace-setup
    file: commands/domino-trace-setup.md
    description: Set up GenAI tracing for an agent or LLM application. Adds Domino SDK imports, @add_tracing
      decorators, and DominoRun context.
  - name: speckit.dominodatalab.ai-gateway
    file: skills/ai-gateway/SKILL.md
    description: "Access external LLM providers through Domino AI Gateway - a secure proxy with centralized\
      \ API key management, usage monitoring, and compliance. Supports OpenAI, AWS Bedrock, Azure OpenAI,\
      \ Anthropic,\u2026"
  - name: speckit.dominodatalab.app-deployment
    file: skills/app-deployment/SKILL.md
    description: "Deploy web applications to Domino Data Lab with expertise in React apps (Vite) behind\
      \ Domino's reverse proxy. Covers app.sh configuration, port configuration, base path handling for\
      \ SPAs, CI/CD with\u2026"

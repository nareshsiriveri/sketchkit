schema_version: '1.0'
extension:
  id: fund-admin
  name: fund-admin
  version: 0.1.0
  description: 'Fund administration and finance ops skills: GL reconciliation, break tracing, accruals,
    roll-forwards, variance commentary, NAV tie-out'
  author: Anthropic FSI
  license: Apache-2.0
  repository: https://github.com/anthropics/financial-services
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.fund-admin.accrual-schedule
    file: skills/accrual-schedule/SKILL.md
    description: "Build the period-end accrual schedule \u2014 for each accrual, compute the entry, cite\
      \ the support, and draft the JE. Use during month-end close; the JE is a draft for controller approval,\
      \ not a posting."
  - name: speckit.fund-admin.break-trace
    file: skills/break-trace/SKILL.md
    description: "Root-cause a reconciliation break to its source transaction or posting \u2014 follow\
      \ the audit trail from the break row back to the originating entry on each side and state what differs\
      \ and why. Use after\u2026"
  - name: speckit.fund-admin.gl-recon
    file: skills/gl-recon/SKILL.md
    description: "Reconcile general ledger to subledger for a trade date or period \u2014 match at the\
      \ position or transaction level, surface breaks, and classify each break by likely cause. Use for\
      \ daily or month-end reco\u2026"
  - name: speckit.fund-admin.nav-tieout
    file: skills/nav-tieout/SKILL.md
    description: "Tie an LP statement to the fund's NAV pack \u2014 recompute the LP's capital account\
      \ from the NAV components and flag any line that doesn't agree. Use before LP statements are distributed."
  - name: speckit.fund-admin.roll-forward
    file: skills/roll-forward/SKILL.md
    description: "Build a roll-forward schedule for a balance-sheet account \u2014 beginning balance plus\
      \ activity less reversals equals ending balance, with each component tied to GL. Use for month-end\
      \ close packages and\u2026"
  - name: speckit.fund-admin.variance-commentary
    file: skills/variance-commentary/SKILL.md
    description: "Write flux commentary for every P&L and balance-sheet line over threshold \u2014 current\
      \ vs prior period and vs budget, with the driver explained from underlying activity. Use for the\
      \ month-end close pack\u2026"
tags:
- financial-services

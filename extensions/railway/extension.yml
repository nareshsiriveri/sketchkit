schema_version: '1.0'
extension:
  id: railway
  name: railway
  version: 1.3.1
  description: Railway agent skills and MCP server for deploying, configuring, monitoring, and troubleshooting
    apps and infrastructure on Railway from Claude Code. Manage services, environments, deployments, databases,
    object storage, networking, and observability.
  author: Railway
  license: Apache-2.0
  repository: https://docs.railway.com/ai/claude-code-plugin
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.railway.use-railway
    file: skills/use-railway/SKILL.md
    description: "Operate Railway infrastructure: sign up for or sign in to a Railway account, create\
      \ projects, provision services and databases, manage object storage buckets, deploy code, configure\
      \ environments and\u2026"
tags:
- deployment

      \ this skill when the user says things like \"add an investor\", \"/add-investor\", \"add investor\
      \ to Carta CRM\", \"create\u2026"
  - name: speckit.carta-crm.add-note
    file: skills/add-note/SKILL.md
    description: "Adds a comment/note to a deal record in the Carta CRM via the Carta CRM MCP Server.\
      \ Use this skill when the user says things like \"add a note\", \"create a note\", \"log a note\"\
      , \"add note to a deal\", \"a\u2026"
  - name: speckit.carta-crm.enrich-company
    file: skills/enrich-company/SKILL.md
    description: "Researches a company by fetching its website and returning structured profile data.\
      \ Use this skill when the user says things like \"enrich this company\", \"look up company info\"\
      , \"research this company\u2026"
  - name: speckit.carta-crm.lookup-fund-portfolio
    file: skills/lookup-fund-portfolio/SKILL.md
    description: "Finds and returns the portfolio companies listed on a VC or investment fund's website.\
      \ Use this skill when the user says things like \"look up portfolio of [fund]\", \"get portfolio\
      \ companies for [fund\u2026"
  - name: speckit.carta-crm.search-companies
    file: skills/search-companies/SKILL.md
    description: "Searches for and retrieves company records from the Carta CRM. Use this skill when the\
      \ user says things like \"find a company\", \"search companies\", \"look up a company\", \"show\
      \ me company details for [n\u2026"
  - name: speckit.carta-crm.search-contacts
    file: skills/search-contacts/SKILL.md
    description: "Searches for and retrieves contact (people) records from the Carta CRM. Use this skill\
      \ when the user says things like \"find a contact\", \"search contacts\", \"look up a person\",\
      \ \"show me contact details\u2026"
  - name: speckit.carta-crm.search-deals
    file: skills/search-deals/SKILL.md
    description: "Searches for and retrieves deal records from the Carta CRM. Use this skill when the\
      \ user says things like \"find a deal\", \"search deals\", \"look up a deal\", \"show me deals for\
      \ [company]\", \"get deal by\u2026"
  - name: speckit.carta-crm.search-fundraisings
    file: skills/search-fundraisings/SKILL.md
    description: "Searches for and retrieves fundraising records from the Carta CRM. Use this skill when\

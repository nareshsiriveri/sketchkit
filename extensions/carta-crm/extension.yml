schema_version: '1.0'
extension:
  id: carta-crm
  name: carta-crm
  version: 0.8.1
  description: "Manage the Carta CRM conversationally \u2014 search, add, update, and enrich investors,\
    \ companies, contacts, deals, notes, and fundraisings via the Carta CRM MCP Server"
  author: Carta
  license: Apache-2.0
  repository: https://carta.com
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.carta-crm.add-company
    file: skills/add-company/SKILL.md
    description: "Adds one or more company records to the Carta CRM via the Carta CRM MCP Server. Use\
      \ this skill when the user says things like \"add a company\", \"create company record\", \"add\
      \ company to CRM\", \"add comp\u2026"
  - name: speckit.carta-crm.add-contact
    file: skills/add-contact/SKILL.md
    description: "Adds one or more contact records to the Carta CRM via the Carta CRM MCP Server. Use\
      \ this skill when the user says things like \"add a contact\", \"create a contact record\", \"add\
      \ contact to CRM\", \"save a\u2026"
  - name: speckit.carta-crm.add-deal
    file: skills/add-deal/SKILL.md
    description: "Creates one or more deal records in the Carta CRM via the Carta CRM MCP Server. Use\
      \ this skill when the user says things like \"add a deal\", \"create a deal\", \"log a deal\", \"\
      add deal to CRM\", \"add deal\u2026"
  - name: speckit.carta-crm.add-fundraising
    file: skills/add-fundraising/SKILL.md
    description: "Adds one or more fundraising records to the Carta CRM via the Carta CRM MCP Server.\
      \ Use this skill when the user says things like \"add a fundraising\", \"create a fundraising\"\
      , \"log a fundraising round\u2026"
  - name: speckit.carta-crm.add-investor
    file: skills/add-investor/SKILL.md

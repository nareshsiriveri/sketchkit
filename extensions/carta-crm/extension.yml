  - name: speckit.carta-crm.update-deal
    file: skills/update-deal/SKILL.md
    description: "Updates an existing deal record in the Carta CRM. Use this skill when the user says\
      \ things like \"update a deal\", \"move deal to [stage]\", \"change deal stage\", \"edit deal\"\
      , \"update deal fields\", \"add a\u2026"
  - name: speckit.carta-crm.update-fundraising
    file: skills/update-fundraising/SKILL.md
    description: "Updates an existing fundraising record in the Carta CRM. Use this skill when the user\
      \ says things like \"update a fundraising\", \"edit fundraising\", \"update fundraising details\"\
      , \"change fundraising st\u2026"
  - name: speckit.carta-crm.update-investor
    file: skills/update-investor/SKILL.md
    description: "Updates an existing investor record in the Carta CRM. Use this skill when the user says\
      \ things like \"update an investor\", \"edit investor\", \"update investor details\", \"change investor\

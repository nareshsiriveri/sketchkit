  - name: speckit.carta-crm.update-note
    file: skills/update-note/SKILL.md
    description: "Searches for notes in the Carta CRM and helps the user update deal comments. Use this\
      \ skill when the user says things like \"update a note\", \"edit note\", \"update note content\"\
      , \"change a note\", or \"/u\u2026"

schema_version: '1.0'
extension:
  id: amplitude
  name: amplitude
  version: 0.1.0
  description: Use Amplitude like an expert - instrument analytics, discover product opportunities, analyze
    charts, create dashboards, manage experiments, and understand users and accounts
  author: Amplitude
  license: Apache-2.0
  repository: https://github.com/amplitude/mcp-marketplace
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.amplitude.add-analytics-instrumentation
    file: skills/add-analytics-instrumentation/SKILL.md
    description: "End-to-end analytics instrumentation workflow for a PR, branch, file, directory, or\
      \ feature. Reads the code, discovers what events should be tracked, and produces a concrete instrumentation\
      \ plan \u2014 al\u2026"
  - name: speckit.amplitude.analyze-account-health
    file: skills/analyze-account-health/SKILL.md
    description: "Summarizes B2B account health by analyzing usage patterns, engagement trends, risk signals,\
      \ and expansion opportunities. Use for customer success reviews, renewal preparation, QBRs, or account\
      \ priori\u2026"
  - name: speckit.amplitude.analyze-ai-topics
    file: skills/analyze-ai-topics/SKILL.md
    description: "Analyzes what users ask AI agents about and how well each topic is served. Only use\
      \ when the user has Amplitude Agent Analytics instrumented in their project. Use when the user asks\
      \ \"what are people\u2026"
  - name: speckit.amplitude.analyze-chart
    file: skills/analyze-chart/SKILL.md
    description: "Performs deep analysis of a specific Amplitude chart to explain trends, anomalies, and\
      \ likely drivers. Use when a metric looks unusual, investigating a spike or drop, or understanding\
      \ the \"why\" behin\u2026"
  - name: speckit.amplitude.analyze-dashboard
    file: skills/analyze-dashboard/SKILL.md
    description: Deeply analyze Amplitude dashboards by analyzing key charts, surfacing top areas for

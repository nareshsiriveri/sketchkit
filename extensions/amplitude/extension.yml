    file: skills/analyze-experiment/SKILL.md
    description: "Designs A/B tests with proper metrics and variants, analyzes running or completed experiments,\
      \ and interprets results with statistical rigor. Use when setting up experiments, checking experiment\
      \ stat\u2026"
  - name: speckit.amplitude.analyze-feedback
    file: skills/analyze-feedback/SKILL.md
    description: "Synthesizes customer feedback into actionable themes including feature requests, bugs,\
      \ pain points, and praise. Use when planning product roadmap, understanding user sentiment, investigating\
      \ specific\u2026"
  - name: speckit.amplitude.compare-user-journeys
    file: skills/compare-user-journeys/SKILL.md
    description: "Compares how two user groups behave differently by analyzing Amplitude Session Replays\
      \ and metrics side by side. Produces a behavioral diff showing what one group does that the other\
      \ doesn't. Use whe\u2026"
  - name: speckit.amplitude.create-chart
    file: skills/create-chart/SKILL.md
    description: "Creates Amplitude charts from natural language descriptions, handling event selection,\
      \ filters, groupings, and visualization choices. Use when you know what you want to measure but\
      \ prefer not to buil\u2026"
  - name: speckit.amplitude.create-dashboard
    file: skills/create-dashboard/SKILL.md
    description: "Builds comprehensive Amplitude dashboards from requirements or goals, organizing charts\
      \ into logical sections with appropriate layouts. Use when creating a complete dashboard from scratch\
      \ or assembli\u2026"
  - name: speckit.amplitude.daily-brief
    file: skills/daily-brief/SKILL.md
    description: "Delivers a daily briefing of the most important changes across your Amplitude instance.\
      \ Use when the user asks for a \"daily download\", \"morning briefing\", \"what's happening\", \"\
      anything I should know\"\u2026"
  - name: speckit.amplitude.debug-replay
    file: skills/debug-replay/SKILL.md
    description: "Turns bug reports into reproducible steps by finding error sessions in Amplitude Session\

      \ the failure\u2026"
  - name: speckit.amplitude.diagnose-errors
    file: skills/diagnose-errors/SKILL.md
    description: "Investigates errors across network failures, JavaScript errors, and error clicks to\
      \ identify what's broken, where, and why. Use when the user says \"what's broken\", \"errors are\

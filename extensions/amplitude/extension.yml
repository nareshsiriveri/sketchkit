  - name: speckit.amplitude.instrument-events
    file: skills/instrument-events/SKILL.md
    description: "Given event_candidates YAML (output from discover-event-surfaces), generates a concrete\
      \ instrumentation plan for priority-3 (critical) events. Acts as a Software Architect: discovers\
      \ existing analyti\u2026"
  - name: speckit.amplitude.investigate-ai-session
    file: skills/investigate-ai-session/SKILL.md
    description: "Deep-dives into specific AI agent sessions or failure patterns to explain why something\
      \ went wrong. Only use when the user has Amplitude Agent Analytics instrumented in their project.\
      \ Use when invest\u2026"
  - name: speckit.amplitude.monitor-ai-quality
    file: skills/monitor-ai-quality/SKILL.md
    description: "Monitors AI agent health across quality, cost, performance, and errors. Only use when\
      \ the user has Amplitude Agent Analytics instrumented in their project. Use when the user asks \"\
      how are our AI agen\u2026"
  - name: speckit.amplitude.monitor-experiments
    file: skills/monitor-experiments/SKILL.md
    description: "Monitors all active and recently completed experiments across Amplitude projects, triages\
      \ them by importance, then runs deep analysis and reporting on the most impactful ones. Use when\
      \ the user asks\u2026"
  - name: speckit.amplitude.monitor-reliability
    file: skills/monitor-reliability/SKILL.md
    description: "Delivers a reliability health check using auto-captured network request, JS error, and\

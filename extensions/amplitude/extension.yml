  - name: speckit.amplitude.weekly-brief
    file: skills/weekly-brief/SKILL.md
    description: "Delivers a weekly briefing summarizing the most important trends, wins, and risks across\
      \ your Amplitude instance. Use when the user asks for a \"weekly review\", \"weekly summary\", \"\
      week in review\", \"wh\u2026"
  - name: speckit.amplitude.what-would-lenny-do
    file: skills/what-would-lenny-do/SKILL.md
    description: "Answers product strategy, growth, pricing, hiring, and leadership questions using Lenny\
      \ Rachitsky's archive. ONLY use this skill if the `lennysdata` MCP server is connected and its tools\
      \ (search_cont\u2026"
tags:
- monitoring

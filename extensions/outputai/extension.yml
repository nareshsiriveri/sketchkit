  - name: speckit.outputai.output-credentials-env-vars
    file: skills/output-credentials-env-vars/SKILL.md
    description: "Wire encrypted credentials to environment variables using the credential: convention.\
      \ Use when setting up LLM provider keys (ANTHROPIC_API_KEY, OPENAI_API_KEY) or any env var that\

      drops.
  - name: speckit.outputai.output-eval-judge-prompt
    file: skills/output-eval-judge-prompt/SKILL.md
    description: Design effective LLM judge .prompt files for evaluators. Use when creating judgeVerdict/judgeScore/judgeLabel

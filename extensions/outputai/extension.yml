  - name: speckit.outputai.output-dev-code-style
    file: skills/output-dev-code-style/SKILL.md
    description: "Code style conventions for Output SDK workflow projects. Use when writing or reviewing\
      \ any TypeScript/JavaScript code. Discovers the project's own linting rules first; falls back to\
      \ Output SDK conven\u2026"
  - name: speckit.outputai.output-dev-create-skeleton
    file: skills/output-dev-create-skeleton/SKILL.md
    description: Generate workflow skeleton files using the Output SDK CLI. Use when starting a new workflow,

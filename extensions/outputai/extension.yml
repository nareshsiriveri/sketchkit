    file: skills/output-build-workflow/SKILL.md
    description: "Implement an Output SDK workflow from a plan document. Use when the user asks to build,\
      \ implement, or code a workflow from an existing plan, or after output-plan-workflow has produced\
      \ a plan and the\u2026"
  - name: speckit.outputai.output-credentials-edit
    file: skills/output-credentials-edit/SKILL.md
    description: View and edit encrypted credentials in an Output.ai project. Use when adding secrets,

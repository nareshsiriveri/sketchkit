  - name: speckit.outputai.output-error-try-catch
    file: skills/output-error-try-catch/SKILL.md
    description: "Fix try-catch anti-pattern in Output SDK workflows. Use when retries aren't working,\
      \ errors are being swallowed, seeing unexpected FatalError wrapping, or when step failures don't\
      \ trigger retry polic\u2026"
  - name: speckit.outputai.output-error-zod-import
    file: skills/output-error-zod-import/SKILL.md
    description: "Fix Zod schema import issues in Output SDK workflows. Use when seeing \"incompatible\
      \ schema\" errors, type errors at step boundaries, schema validation failures, or when schemas don't\
      \ match between ste\u2026"

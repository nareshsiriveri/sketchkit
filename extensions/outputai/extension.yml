  - name: speckit.outputai.output-dev-model-selection
    file: skills/output-dev-model-selection/SKILL.md
    description: "Pick the right LLM model for an Output SDK prompt file. Use when writing a new .prompt\
      \ file, reviewing a model choice, or upgrading a stale model. Walks through priority (reasoning/balance/speed/cost\u2026"
  - name: speckit.outputai.output-dev-prompt-file
    file: skills/output-dev-prompt-file/SKILL.md
    description: Create .prompt files for LLM operations in Output SDK workflows. Use when designing prompts,
      configuring LLM providers, or using Liquid.js templating.
  - name: speckit.outputai.output-dev-scenario-file
    file: skills/output-dev-scenario-file/SKILL.md
    description: Create test scenario JSON files for Output SDK workflows. Use when creating test inputs,
      documenting expected behaviors, or setting up workflow testing.
  - name: speckit.outputai.output-dev-skill-file
    file: skills/output-dev-skill-file/SKILL.md
    description: Create .md skill files for Output framework's lazy-loaded instruction system. Use when
      adding skills to prompts, configuring skill loading, or debugging skill resolution.
  - name: speckit.outputai.output-dev-step-function
    file: skills/output-dev-step-function/SKILL.md
    description: Create step functions in steps.ts for Output SDK workflows. Use when implementing I/O

    description: "Upgrade a project between versions of the Output framework. Use when the user asks to\
      \ upgrade, migrate, or move to a newer Output version. Detects the current @outputai/* version in\
      \ the project, fetc\u2026"
  - name: speckit.outputai.output-plan-workflow
    file: skills/output-plan-workflow/SKILL.md
    description: "Use when the user asks to create, build, generate, scaffold, or plan a new workflow.\
      \ Orchestrates the full planning process including architecture, steps, prompts, evaluators, and\
      \ testing strategy us\u2026"
  - name: speckit.outputai.output-services-check

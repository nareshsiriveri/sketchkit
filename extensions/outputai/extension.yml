  - name: speckit.outputai.output-workflow-stop
    file: skills/output-workflow-stop/SKILL.md
    description: Stop a running Output SDK workflow execution. Use when cancelling a workflow, stopping
      a long-running process, terminating a stuck workflow, or when you need to abort a workflow in progress.
  - name: speckit.outputai.output-workflow-trace
    file: skills/output-workflow-trace/SKILL.md
    description: "Analyze Output SDK workflow execution traces. Use when debugging a specific workflow,\

  - name: speckit.outputai.output-dev-upgrade-prompt-models
    file: skills/output-dev-upgrade-prompt-models/SKILL.md
    description: "Bulk-upgrade the model field across .prompt files to the latest version of each prompt's\
      \ existing family. Use when prompt models have drifted (eg sonnet-4 \u2192 sonnet-4-6), after a\
      \ long pause between fr\u2026"
  - name: speckit.outputai.output-dev-workflow-cost
    file: skills/output-dev-workflow-cost/SKILL.md
    description: Calculate and display the cost of an Output SDK workflow execution run. Use when checking

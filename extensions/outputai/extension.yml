  - name: speckit.outputai.output-eval-validate-judge
    file: skills/output-eval-validate-judge/SKILL.md
    description: Validate LLM judges against human labels using TPR/TNR metrics and train/dev/test splits.
      Use after writing a judge prompt to verify it agrees with human judgment.
  - name: speckit.outputai.output-meta-post-flight
    file: skills/output-meta-post-flight/SKILL.md
    description: Post-flight validation for Output SDK workflow operations. Systematic verification of
      step completion, convention compliance, quality validation, and deliverable verification.
  - name: speckit.outputai.output-meta-pre-flight
    file: skills/output-meta-pre-flight/SKILL.md
    description: Pre-flight validation checks for Output SDK workflow operations. Ensures conventions
      are followed, requirements are gathered, and quality gates are passed before workflow execution.
  - name: speckit.outputai.output-meta-project-context
    file: skills/output-meta-project-context/SKILL.md
    description: "Comprehensive guide to Output.ai Framework for building durable, LLM-powered workflows\
      \ orchestrated by Temporal. Covers project structure, workflow patterns, steps, LLM integration,\

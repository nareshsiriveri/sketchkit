      root causes.
  - name: speckit.outputai.agent-workflow-planner
    file: agents/workflow_planner.md
    description: "Design new workflows for the Output SDK system, plan complex workflow orchestrations,\
      \ or create comprehensive implementation blueprints. Use at the beginning of workflow development\
      \ to ensure proper\u2026"
  - name: speckit.outputai.agent-workflow-prompt-writer
    file: agents/workflow_prompt_writer.md
    description: Use this agent when writing, reviewing, or debugging LLM prompt files (.prompt). Specializes
      in Liquid.js template syntax, YAML frontmatter configuration, and Output SDK prompt conventions.
  - name: speckit.outputai.agent-workflow-quality
    file: agents/workflow_quality.md
    description: "Use this agent when you need expert guidance on Output SDK implementation patterns,\
      \ code quality, and best practices. Invoke when writing or reviewing workflow code, troubleshooting\
      \ implementation is\u2026"

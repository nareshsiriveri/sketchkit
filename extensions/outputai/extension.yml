      typed.
  - name: speckit.outputai.output-error-nondeterminism
    file: skills/output-error-nondeterminism/SKILL.md
    description: Fix non-determinism errors in Output SDK workflows. Use when seeing replay failures,
      inconsistent results between runs, "non-deterministic" error messages, or workflows behaving differently

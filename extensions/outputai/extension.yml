    file: skills/output-workflow-start/SKILL.md
    description: "Start an Output SDK workflow asynchronously without waiting for completion. Use when\
      \ starting long-running workflows, getting a workflow ID for later monitoring, running workflows\
      \ in the background,\u2026"
  - name: speckit.outputai.output-workflow-status
    file: skills/output-workflow-status/SKILL.md
    description: Check the status of an Output SDK workflow execution. Use when monitoring a running workflow,

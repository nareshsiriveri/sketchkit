    description: "Verify Output SDK development services are running. Use when debugging workflows, starting\
      \ development, encountering connection errors, services may be down, or when you see \"ECONNREFUSED\"\
      \ or timeout\u2026"
  - name: speckit.outputai.output-workflow-list
    file: skills/output-workflow-list/SKILL.md
    description: "List all available Output SDK workflows in the project. Use when discovering what workflows\
      \ exist, checking workflow names, exploring the project's workflow structure, or when unsure which\
      \ workflows\u2026"
  - name: speckit.outputai.output-workflow-reset
    file: skills/output-workflow-reset/SKILL.md
    description: "Re-run an Output SDK workflow from after a specific completed step, creating a new run\
      \ that replays up to that point and re-executes subsequent steps. Use when iterating on a later\
      \ step's prompt or l\u2026"

  name: sagemaker-ai
  version: 1.2.1
  description: Build, train, and deploy AI models with deep AWS AI/ML expertise brought directly into
    your coding assistants, covering the surface area of Amazon SageMaker AI.
  author: Amazon Web Services
  license: Apache-2.0
  repository: https://github.com/awslabs/agent-plugins
requires:

schema_version: '1.0'
extension:
  id: zoom-plugin
  name: zoom-plugin
  version: 1.1.3
  description: Claude plugin for planning, building, and debugging Zoom integrations across REST APIs,
    SDKs, webhooks, bots, and MCP workflows
  author: Zoom
  license: Apache-2.0
  repository: https://developers.zoom.us/
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.zoom-plugin.build-zoom-bot
    file: skills/build-zoom-bot/SKILL.md
    description: Build a Zoom meeting bot, recorder, or real-time media workflow. Use when joining meetings
      programmatically, processing live media or transcripts, or combining Meeting SDK, RTMS, and backend
      services.
  - name: speckit.zoom-plugin.build-zoom-meeting-app
    file: skills/build-zoom-meeting-app/SKILL.md
    description: Build or embed a Zoom meeting flow. Use when implementing Meeting SDK joins, web or mobile
      meeting embeds, meeting lifecycle flows, or when deciding between Meeting SDK and Video SDK.
  - name: speckit.zoom-plugin.choose-zoom-approach
    file: skills/choose-zoom-approach/SKILL.md
    description: "Choose the right Zoom architecture for a use case. Use when deciding between REST API,\
      \ Webhooks, WebSockets, Meeting SDK, Video SDK, Zoom Apps SDK, Zoom MCP, Phone, Contact Center,\
      \ or a hybrid approa\u2026"
  - name: speckit.zoom-plugin.cobrowse-sdk
    file: skills/cobrowse-sdk/SKILL.md
    description: "Reference skill for Zoom Cobrowse SDK. Use after routing to a collaborative-support\
      \ workflow when implementing browser co-browsing, annotation tools, privacy masking, remote assist,\
      \ or PIN-based sess\u2026"
  - name: speckit.zoom-plugin.android

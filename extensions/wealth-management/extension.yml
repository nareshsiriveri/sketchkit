schema_version: '1.0'
extension:
  id: wealth-management
  name: wealth-management
  version: 0.1.2
  description: 'Wealth management and financial advisory tools: client reviews, financial planning, portfolio
    analysis, and client reporting'
  author: Anthropic FSI
  license: Apache-2.0
  repository: https://github.com/anthropics/financial-services
requires:
  speckit_version: '>=0.2.0'
provides:

schema_version: '1.0'
extension:
  id: airwallex-agentos
  name: airwallex-agentos
  version: 0.2.2
  description: "Bring Airwallex's global financial infrastructure to Claude. Orchestrate actions across\
    \ your account in plain language, e.g., set up invoices from a PO, onboard suppliers from invoices,\
    \ and check current cash position across currencies. AgentOS bundles pre-built finance Skills with\
    \ MCP servers. A p\u2026"
  author: Airwallex
  license: Apache-2.0
  repository: https://www.airwallex.com/docs
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.airwallex-agentos.awx-best-practices
    file: skills/awx-best-practices/SKILL.md
    description: "Fallback Airwallex skill \u2014 works with the Airwallex CLI or the Airwallex MCP server.\
      \ Use ONLY when no dedicated workflow skill matches the task. Covers ad-hoc operations (list, get,\
      \ update, delete, v\u2026"
  - name: speckit.airwallex-agentos.beneficiary-creation
    file: skills/beneficiary-creation/SKILL.md
    description: "Extract bank details from supplier invoices or documents, validate per-country requirements,\
      \ and create beneficiaries in Airwallex. Use when the user says \"set up this supplier\", \"onboard\
      \ these vendo\u2026"
  - name: speckit.airwallex-agentos.card-provisioning
    file: skills/card-provisioning/SKILL.md
    description: "Provision virtual or physical corporate cards in Airwallex Issuing \u2014 create cardholders,\
      \ issue cards with spend limits, and manage card spending. Use when the user says \"create a card\
      \ for\", \"spin up\u2026"
  - name: speckit.airwallex-agentos.contract-to-billing
    file: skills/contract-to-billing/SKILL.md
    description: "Extract billing details from purchase orders, contracts, or quotes, then set up Airwallex\
      \ Billing by creating invoices and/or subscriptions \u2014 matching existing customers, products,\
      \ and prices to avoi\u2026"
  - name: speckit.airwallex-agentos.manage-cashflow
    file: skills/manage-cashflow/SKILL.md
    description: "Multi-currency cash management \u2014 balances, receivables, obligations, FX exposure,\
      \ runway, rebalancing, and indicative FX rates. Use when the user asks about cash position, treasury\
      \ health, what is ow\u2026"
tags:
- airwallex
- business accounts
- billing
- invoices
- payments
- issuing
- treasury
- cli
- mcp

    description: "Sets up DataRobot for local development including Python SDK, dr-cli, Agent Assist,\
      \ and all required dependencies. Use when the user has not yet worked with DataRobot on this machine,\
      \ OR when any Dat\u2026"
  - name: speckit.datarobot-agent-skills.datarobot-workload-api
    file: skills/datarobot-workload-api/SKILL.md
    description: "Use when the user wants to create, configure, scale, debug, observe, or roll out container\

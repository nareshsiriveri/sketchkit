    description: "Guidance for setting up CI/CD pipelines for DataRobot application templates using GitLab,\
      \ GitHub Actions, and Pulumi for infrastructure as code. Use when setting up CI/CD pipelines, configuring\
      \ deplo\u2026"
  - name: speckit.datarobot-agent-skills.datarobot-data-preparation
    file: skills/datarobot-data-preparation/SKILL.md
    description: Tools and guidance for data upload, dataset management, data validation, and preparing

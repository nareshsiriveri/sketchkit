  description: "DataRobot skills for AI/ML workflows \u2014 model training, deployment, predictions, feature\
    \ engineering, monitoring, explainability, data preparation, App Framework CI/CD, and external agent\
    \ monitoring."
  author: DataRobot
  license: Apache-2.0
  repository: https://datarobot.com
requires:

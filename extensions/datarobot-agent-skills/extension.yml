    file: skills/datarobot-agent-assist/SKILL.md
    description: "Use when the user wants to design, build, code, simulate, or deploy an AI agent (not\
      \ a predictive model) to DataRobot; mentions agent_spec.md, dr-assist, datarobot-agent-assist, dress\

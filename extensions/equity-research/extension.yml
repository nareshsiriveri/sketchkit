schema_version: '1.0'
extension:
  id: equity-research
  name: equity-research
  version: 0.1.2
  description: 'Equity research tools: earnings analysis, initiating coverage reports, and research workflows'
  author: Anthropic FSI
  license: Apache-2.0
  repository: https://github.com/anthropics/financial-services
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.equity-research.catalysts
    file: commands/catalysts.md
    description: View or update the catalyst calendar
  - name: speckit.equity-research.earnings-preview
    file: commands/earnings-preview.md
    description: Build a pre-earnings preview with scenarios
  - name: speckit.equity-research.earnings
    file: commands/earnings.md
    description: Analyze quarterly earnings and create an earnings update report
  - name: speckit.equity-research.initiate
    file: commands/initiate.md
    description: Create an initiating coverage report
  - name: speckit.equity-research.model-update
    file: commands/model-update.md
    description: Update a financial model with new data
  - name: speckit.equity-research.morning-note
    file: commands/morning-note.md
    description: Draft a morning meeting note
  - name: speckit.equity-research.screen
    file: commands/screen.md
    description: Run a stock screen or generate investment ideas
  - name: speckit.equity-research.sector
    file: commands/sector.md
    description: Create a sector overview report
  - name: speckit.equity-research.thesis
    file: commands/thesis.md
    description: Create or update an investment thesis
  - name: speckit.equity-research.catalyst-calendar
    file: skills/catalyst-calendar/SKILL.md
    description: "Build and maintain a calendar of upcoming catalysts across a coverage universe \u2014\
      \ earnings dates, conferences, product launches, regulatory decisions, and macro events. Helps prioritize\
      \ attention and\u2026"
  - name: speckit.equity-research.earnings-analysis
    file: skills/earnings-analysis/SKILL.md
    description: "Create professional equity research earnings update reports (8-12 pages, 3,000-5,000\
      \ words) analyzing quarterly results for companies already under coverage. Fast-turnaround format\
      \ focusing on beat/m\u2026"
  - name: speckit.equity-research.earnings-preview-skill
    file: skills/earnings-preview/SKILL.md
    description: "Build pre-earnings analysis with estimate models, scenario frameworks, and key metrics\
      \ to watch. Use before a company reports quarterly earnings to prepare positioning notes, set up\
      \ bull/bear scenari\u2026"
  - name: speckit.equity-research.idea-generation
    file: skills/idea-generation/SKILL.md
    description: "Systematic stock screening and investment idea sourcing. Combines quantitative screens,\
      \ thematic research, and pattern recognition to surface new long and short ideas. Use when looking\
      \ for new ideas,\u2026"
  - name: speckit.equity-research.initiating-coverage
    file: skills/initiating-coverage/SKILL.md
    description: "Create institutional-quality equity research initiation reports through a 5-task workflow.\
      \ Tasks must be executed individually with verified prerequisites - (1) company research, (2) financial\
      \ modeli\u2026"
  - name: speckit.equity-research.model-update-skill
    file: skills/model-update/SKILL.md
    description: "Update financial models with new data \u2014 quarterly earnings, management guidance,\
      \ macro changes, or revised assumptions. Adjusts estimates, recalculates valuation, and flags material\
      \ changes. Use afte\u2026"
  - name: speckit.equity-research.morning-note-skill
    file: skills/morning-note/SKILL.md
    description: "Draft concise morning meeting notes summarizing overnight developments, trade ideas,\
      \ and key events for coverage stocks. Designed for the 7am morning meeting format \u2014 tight,\
      \ opinionated, actionable.\u2026"
  - name: speckit.equity-research.sector-overview
    file: skills/sector-overview/SKILL.md
    description: "Create comprehensive industry and sector landscape reports covering market dynamics,\
      \ competitive positioning, key players, and thematic trends. Use for client requests, sector initiations,\
      \ thematic r\u2026"
  - name: speckit.equity-research.thesis-tracker
    file: skills/thesis-tracker/SKILL.md
    description: "Maintain and update investment theses for portfolio positions and watchlist names. Track\
      \ key data points, catalysts, and thesis milestones over time. Use when updating a thesis with new\
      \ information,\u2026"
tags:
- financial-services

schema_version: '1.0'
extension:
  id: buildkite
  name: buildkite
  version: 1.0.0
  description: "Official Buildkite skills for Claude Code, Cursor, and other AI coding agents \u2014 pipelines,\
    \ migration, preflight, agent runtime, CLI, and API"
  author: Buildkite
  license: Apache-2.0
  repository: https://buildkite.com
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.buildkite.buildkite-agent-runtime
    file: skills/buildkite-agent-runtime/SKILL.md
    description: "This skill should be used when the user asks to \"add an annotation\", \"upload artifacts\
      \ from a step\", \"share data between steps\", \"upload pipeline dynamically\", \"request an OIDC\
      \ token inside a step\",\u2026"
  - name: speckit.buildkite.buildkite-api
    file: skills/buildkite-api/SKILL.md
    description: "This skill should be used when the user asks to \"call the Buildkite API\", \"use the\
      \ REST API\", \"write a GraphQL query\", \"set up webhooks\", \"automate Buildkite\", \"integrate\
      \ with Buildkite programmatica\u2026"
  - name: speckit.buildkite.buildkite-cli
    file: skills/buildkite-cli/SKILL.md
    description: "This skill should be used when the user asks to \"trigger a build\", \"check build status\"\
      , \"watch a build\", \"view build logs\", \"rebuild a build\", \"cancel a build\", \"list builds\"\
      , \"download artifacts\",\u2026"
  - name: speckit.buildkite.buildkite-migration
    file: skills/buildkite-migration/SKILL.md
    description: "This skill should be used when the user asks to \"migrate to Buildkite\", \"convert\
      \ pipelines from Jenkins\", \"convert GitHub Actions workflows\", \"convert CircleCI config\", \"\
      convert Bitbucket Pipelines\",\u2026"
  - name: speckit.buildkite.buildkite-pipelines
    file: skills/buildkite-pipelines/SKILL.md
    description: "This skill should be used when the user asks to \"write a pipeline\", \"add caching\"\
      , \"make this build faster\", \"show test failures in the build page\", \"add annotations\", \"\
      only run tests when code chang\u2026"
  - name: speckit.buildkite.buildkite-preflight
    file: skills/buildkite-preflight/SKILL.md
    description: Runs Buildkite CI builds against changes in the local working tree. Use when asked to
      run preflight or run CI.
tags:
- development

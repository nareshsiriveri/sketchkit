    file: skills/development-workflow/SKILL.md
    description: "Orchestrates the complete Falcon Foundry app lifecycle from requirements through deployment.\
      \ TRIGGER when user asks to \"create a Foundry app\", \"build a Foundry app\", \"plan a Foundry\
      \ app\", runs any `f\u2026"

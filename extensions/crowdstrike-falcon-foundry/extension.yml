      , \"connect to a third\u2026"
  - name: speckit.crowdstrike-falcon-foundry.collections-development
    file: skills/collections-development/SKILL.md
    description: "Design JSON Schema collections and CRUD patterns for Falcon Foundry apps. TRIGGER when\
      \ user asks to \"create a collection\", \"define a JSON schema\", \"store data in Foundry\", runs\
      \ `foundry collections c\u2026"
  - name: speckit.crowdstrike-falcon-foundry.debugging-workflows
    file: skills/debugging-workflows/SKILL.md
    description: "Systematic troubleshooting for Falcon Foundry CLI errors, manifest validation failures,\

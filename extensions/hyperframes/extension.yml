  - name: speckit.hyperframes.website-to-video
    file: skills/website-to-video/SKILL.md
    description: "Capture a general website/URL and turn it into a HyperFrames video (site tour, showcase,\
      \ or social clip from the site's own visuals). Uses headless Chrome screenshots + brand assets.\
      \ Use when intent\u2026"
tags:
- design

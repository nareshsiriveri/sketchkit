schema_version: '1.0'
extension:
  id: skill-creator
  name: skill-creator
  version: 0.1.0
  description: Create new skills, improve existing skills, and measure skill performance. Use when users
    want to create a skill from scratch, update or optimize an existing skill, run evals to test a skill,
    or benchmark skill performance with variance analysis.
  author: Anthropic
  license: Apache-2.0
  repository: https://github.com/anthropics/claude-plugins-official
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.skill-creator.skill-creator
    file: skills/skill-creator/SKILL.md
    description: "Create new skills, modify and improve existing skills, and measure skill performance.\
      \ Use when users want to create a skill from scratch, edit, or optimize an existing skill, run evals\
      \ to test a skil\u2026"
tags:
- claude-code

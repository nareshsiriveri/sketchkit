schema_version: '1.0'
extension:
  id: supabase
  name: supabase
  version: 0.1.11
  description: Official Supabase plugin for Claude Code with bundled Supabase skills and MCP access for
    project management, database work, auth, storage, and Postgres best practices.
  author: Supabase
  license: Apache-2.0
  repository: https://github.com/supabase-community/supabase-plugin
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.supabase.supabase
    file: skills/supabase/SKILL.md
    description: "Use when doing ANY task involving Supabase. Triggers: Supabase products (Database, Auth,\
      \ Edge Functions, Realtime, Storage, Vectors, Cron, Queues); client libraries and SSR integrations\
      \ (supabase-js,\u2026"
  - name: speckit.supabase.supabase-postgres-best-practices
    file: skills/supabase-postgres-best-practices/SKILL.md
    description: Postgres performance optimization and best practices from Supabase. Use this skill when
      writing, reviewing, or optimizing Postgres queries, schema designs, or database configurations.
tags:
- supabase
- postgres
- database
- backend
- mcp
- auth
- storage
- realtime
- edge-functions
- migrations
- rls

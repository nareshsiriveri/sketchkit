schema_version: '1.0'
extension:
  id: chrome-devtools-mcp
  name: chrome-devtools-mcp
  version: 1.3.0
  description: Reliable automation, in-depth debugging, and performance analysis in Chrome using Chrome
    DevTools and Puppeteer
  author: Unknown
  license: Apache-2.0
  repository: https://github.com/ChromeDevTools/chrome-devtools-mcp
requires:
  speckit_version: '>=0.2.0'
provides:
  commands:
  - name: speckit.chrome-devtools-mcp.a11y-debugging
    file: skills/a11y-debugging/SKILL.md
    description: "Uses Chrome DevTools MCP for accessibility (a11y) debugging and auditing based on web.dev\
      \ guidelines. Use when testing semantic HTML, ARIA labels, focus states, keyboard navigation, tap\
      \ targets, and\u2026"
  - name: speckit.chrome-devtools-mcp.chrome-devtools
    file: skills/chrome-devtools/SKILL.md
    description: "Uses Chrome DevTools via MCP for efficient debugging, troubleshooting and browser automation.\
      \ Use when debugging web pages, automating browser interactions, analyzing performance, or inspecting\
      \ netwo\u2026"
  - name: speckit.chrome-devtools-mcp.chrome-devtools-cli
    file: skills/chrome-devtools-cli/SKILL.md
    description: Use this skill to write shell scripts or run shell commands to automate tasks in the
      browser or otherwise use Chrome DevTools via CLI.
  - name: speckit.chrome-devtools-mcp.debug-optimize-lcp
    file: skills/debug-optimize-lcp/SKILL.md
    description: "Guides debugging and optimizing Largest Contentful Paint (LCP) using Chrome DevTools\
      \ MCP tools. Use this skill whenever the user asks about LCP performance, slow page loads, Core\
      \ Web Vitals optimizat\u2026"
  - name: speckit.chrome-devtools-mcp.memory-leak-debugging
    file: skills/memory-leak-debugging/SKILL.md
    description: "Diagnoses and resolves memory leaks in JavaScript/Node.js applications. Use when a user\
      \ reports high memory usage, OOM errors, or wants to analyze heapsnapshots or run memory leak detection\
      \ tools lik\u2026"
  - name: speckit.chrome-devtools-mcp.troubleshooting
    file: skills/troubleshooting/SKILL.md
    description: Uses Chrome DevTools MCP and documentation to troubleshoot connection and target issues.
      Trigger this skill when list_pages, new_page, or navigate_page fail, or when the server initialization
      fails.
tags:
- development
